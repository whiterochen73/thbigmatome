# バント判定テーブル
# 出典: wiki/bunt_table.md（https://thbigbaseball.wiki.fc2.com/wiki/バント表）
# 取得日: 2026-02-20
#
# バント宣言時の成功/失敗を判定するための参照表
# 出目 = d20の目 + バント値
# 先頭走者位置（1塁/2塁/3塁）で参照するテーブルが変わる

metadata:
  source: "wiki/bunt_table.md"
  description: "バント宣言時の成否判定テーブル（先頭走者位置別）"
  dice_formula: "d20 + バント値"
  note: "バント時は通常のレンジチェック表（range_check_table.md）を使わない"
  macro_syntax:
    first_base: "#-b-1"
    second_base: "#-b-2"
    squeeze: "#-b-3"

# 共通記号
symbols:
  success: "バント成功（送球先が付記される）"
  success_plus: "2死または無走者時にバントヒット（それ以外は通常成功）"
  hit: "バントヒット（IH1=1塁打相当）"
  strikeout_foul: "ファール、スリーバント失敗、三振"
  double_play: "走者がアウト（フォース/タッチプレーで状況が異なる）"
  fc: "フィールダースチョイス表（fc_table.md）参照"
  R: "守備側レンジに依存"
  S: "走者走力に依存"
  RS: "守備レンジと走者走力の両方に依存"

# 三振の補正
modifiers:
  three_bunt_penalty: -5
  squeeze_infield_in_penalty: -5

# ===== バント表/1塁（先頭走者：1塁） =====
table_first_base:
  description: "先頭走者が1塁の場合"
  entries:
    - dice: "1以下"
      result: "ファール、スリーバント失敗、三振"
    - dice: 2
      result: "併殺 3-6-4"
    - dice: 3
      result: "併殺 5-6-3"
    - dice: 4
      result: "バント成功 1-4"
    - dice: 5
      result: "2球続けてファール。バントを続けるならスリーバント（-5修正）、スリーバントなら三振"
    - dice: 6
      result: "2球続けてファール。バントを続けるならスリーバント（-5修正）、スリーバントなら三振"
    - dice: 7
      result: "バント成功 5-3"
    - dice: 8
      result: "FC表。1塁送球→1-4、2塁送球→1-6"
    - dice: 9
      result: "併殺 1-6-4。ただし投手レンジ3以下なら1-6"
    - dice: 10
      result: "併殺 2-6-4。ただし捕手レンジ3以下か走力4以上の左打者なら2-6"
    - dice: 11
      result: "バント成功 1-3。ただし投手レンジ3以下ならバントヒットIH1"
    - dice: 12
      result: "バント成功 1-3。ただし投手レンジ5なら1-6"
    - dice: 13
      result: "ピッチャーフライ 1-1-4の併殺。ただし1塁走者の走力が4以上なら帰塁成功"
    - dice: 14
      result: "FC表。1塁送球→1-4、2塁送球→1-6"
    - dice: 15
      result: "FC表。1塁送球→2-4、2塁送球→2-6"
    - dice: 16
      result: "バント成功 1-3。ただし投手レンジ4以上なら2塁送球1-6も可（FC表参照）"
    - dice: 17
      result: "バント成功 2-3。ただし捕手レンジ4以上なら2塁送球2-6も可（FC表参照）"
    - dice: 18
      result: "バント成功 3-4。ただし一塁レンジ4以上なら2塁送球3-6も可（FC表参照）"
    - dice: 19
      result: "バント成功 5-4。ただし三塁レンジ4以上なら2塁送球5-6も可（FC表参照）"
    - dice: 20
      result: "バント成功 1-3"
    - dice: 21
      result: "バント成功 2-3"
    - dice: 22
      result: "バント成功 3-4"
    - dice: 23
      result: "バント成功 5-4"
    - dice: 24
      result: "バント成功 1-4。打者の走力が投手レンジ以上ならバントヒットIH1"
    - dice: 25
      result: "バント成功 2-3"
    - dice: 26
      result: "バント成功 3-4"
    - dice: 27
      result: "バント成功 5-4"
    - dice: 28
      result: "バント成功 1-4。走者無しか2死のときはバントヒットIH1"
    - dice: 29
      result: "バント成功 5-4。走者無しか2死のときはバントヒットIH5"

