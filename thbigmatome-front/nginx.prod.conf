# HTTP: certbot http-01 チャレンジ + HTTPS リダイレクト
server {
    listen 80;
    server_name dugout.thbig.fun;

    # certbot webroot チャレンジ用（証明書更新時に使用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 上記以外は HTTPS にリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS メインサーバー
server {
    listen 443 ssl;
    server_name dugout.thbig.fun;
    root /usr/share/nginx/html;
    index index.html;

    # SSL 証明書（Let's Encrypt）
    ssl_certificate     /etc/letsencrypt/live/dugout.thbig.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dugout.thbig.fun/privkey.pem;

    # SSL プロトコル・暗号スイート（Mozilla 推奨 Intermediate 設定）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # SPA フォールバック（Vue Router の history モード対応）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Rails API プロキシ
    location /api/ {
        proxy_pass http://rails:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Rails ヘルスチェック
    location /up {
        proxy_pass http://rails:80/up;
        proxy_set_header Host $host;
    }

    # ActiveStorage ファイル（カード画像等）
    location /rails/active_storage/ {
        proxy_pass http://rails:80/rails/active_storage/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 静的ファイルのキャッシュ制御
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}
