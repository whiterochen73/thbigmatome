# Docker Compose for thbigmatome development environment
# Usage:
#   docker compose up            # db + rails + frontend
#   docker compose --profile tools run parser pytest
#   docker compose --profile irc up irc

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"   # ホストPG(5432)との競合回避
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: morinaga
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: thbigmatome_development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morinaga -d thbigmatome_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  rails:
    build:
      context: ./thbigmatome
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./thbigmatome:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USERNAME: morinaga
      RAILS_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      THBIG_IRC_PARSER_PYTHON: /app-parser/.venv/bin/python
    command: bin/rails server -b 0.0.0.0

  frontend:
    build:
      context: ./thbigmatome-front
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./thbigmatome-front:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
    command: npm run dev -- --host 0.0.0.0

  parser:
    build:
      context: ./thbig-irc-parser
      dockerfile: Dockerfile.dev
    volumes:
      # テストコードがハードコードされたホストパスを参照するため同一パスでマウント
      - /home/morinaga/projects/thbig-irc-parser:/home/morinaga/projects/thbig-irc-parser
      # PDFカードデータ・IRCログ（テストがWindowsパスをハードコード）
      - /mnt/c/Users/necro/Documents/to_team:/mnt/c/Users/necro/Documents/to_team
    working_dir: /home/morinaga/projects/thbig-irc-parser
    depends_on:
      - db
    profiles:
      - tools
    environment:
      DB_HOST: db
      DB_USERNAME: morinaga
    command: sleep infinity

  irc:
    build:
      context: ./thbig-irc
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
      - "5174:5173"
    volumes:
      - ./thbig-irc:/app
      - /app/node_modules
    profiles:
      - irc
    env_file:
      - ./thbig-irc/.env

volumes:
  pgdata:
