      - "AIエージェント向けフォーマット（why/exception/related）（cmd_905）"
  - version: "1.0"
    date: "2026-04-01"
    breaking: false
    changes:
      - "初版作成（cmd_849）"

# ═══════════════════════════════════════════════════════════════
# Layer 1: 東方BIG野球（ゲーム本体のルール）
# ─ IRCチャットで行われる東方BIG野球そのもののルール
# ═══════════════════════════════════════════════════════════════
thbig_baseball:

  # ─────────────────────────────────────────────────────────────
  # 選手カード能力値
  # ─────────────────────────────────────────────────────────────
  player_card:

    card_types:
      values:
        - "pitcher"
        - "batter"
      why: "投手と野手は役割が根本的に異なり、別カードとして管理する。同一選手が両種別のカードを持つことはある（二刀流）"
      exception: null
      related:
        - "lpena.team_composition.outside_world"

    stamina:
      starter:
        min: 4
        max: 9
      relief:
        min: 0
        max: 3
      why: "先発投手は多イニングを担うため高スタミナ（4-9）。中継ぎは短回専門のため低スタミナ（0-3）"
      exception: null
      related:
        - "thbig_baseball.player_card.card_types"

    speed:
      min: 1
      max: 5
      why: "走力を5段階で表現。盗塁判定やエンドランに使用する"
      exception: null
      related: []

    bunt:
      min: 1
      max: 10
      why: "バント能力を10段階で表現"
      exception: null
      related: []

    steal_start:
      min: 1
      max: 22
      why: "盗塁開始判定値。ダイス値との比較で盗塁を試みるかを決定する"
      exception: null
      related:
        - "thbig_baseball.player_card.steal_end"

    steal_end:
      min: 1
      max: 22
      why: "盗塁完了判定値。steal_startと組み合わせて盗塁成功判定に使用する"
      exception: null
      related:
        - "thbig_baseball.player_card.steal_start"

    injury_rate:
      min: 0
      max: 7
      why: "負傷確率を0-7で表現（0=負傷しない）。UP表（好プレイ珍プレイ表）の判定に使用する"
      exception: null
      related: []

    uniqueness:
      constraint: "(card_set_id, player_id, card_type)"
      why: "同一カードセット内で同一選手の同種カードは1枚のみ。異なるカードセット間では同一選手の複数カードを持てる"
      exception: null
      related:
        - "thbig_baseball.player_card.variant"

    variant:
      description: "同一カードセット内で同一選手・同一card_typeの複数バリエーションを区別するラベル"
      type: "string（nullable）"
      examples:
        - "湘南（PM2026の初瀬麻里安投手・湘南バージョン）"
        - "町田（PM2026の初瀬麻里安投手・町田バージョン）"
        - "UR（PM2026の初瀬麻里安投手・URバージョン）"
      why: "PM2026カードセット等で同一選手の同タイプカードが複数存在する場合に対応するため。variantがnullの通常カードは従来通り1枚制限"
      exception: null
      related:
        - "thbig_baseball.player_card.uniqueness"

  # ─────────────────────────────────────────────────────────────
  # 試合メカニクス
  # ─────────────────────────────────────────────────────────────
  game:

    batting_order:
      min: 1
      max: 9
      why: "9人打線が野球の基本ルール。DH制採用時も打順は1〜9の9枠"
      exception: null
      related: []

    ko_innings_threshold:
      value: 5
      why: "先発投手が5イニング未満で交代した場合はKO（knocked out）扱い。勝利投手の権利は5イニング完投が条件"
      exception: null
      related:
        - "thbig_baseball.player_card.stamina"

# ═══════════════════════════════════════════════════════════════
# Layer 2: Lペナ（IRCリーグ東方BIG野球ペナントレース 運営ルール）
# ─ IRCリーグ（東方BIG野球ペナントレース）の運営・チーム管理ルール
# ═══════════════════════════════════════════════════════════════
lpena:

  # ─────────────────────────────────────────────────────────────
  # チーム構成ルール
  # ─────────────────────────────────────────────────────────────
  team_composition:

    team_total_cost:
      max: 200
      why: "チーム間のコスト格差を制限し、競技バランスを維持する。上限200はコミッショナーが設定した公平性の基準値"
      exception: "excluded_from_team_total=true の選手（助っ人枠等）はコスト計算対象外"
      related:
        - "lpena.team_composition.first_squad_cost"
        - "lpena.team_composition.roster"

    first_squad_cost:
      tiers:
        - min_players: 28
          max_cost: 120
        - min_players: 27
          max_cost: 119
        - min_players: 26
          max_cost: 117
        - min_players: 25
          max_cost: 114
      minimum_players: 25
      why: "1軍規模が大きいほどコスト上限が上がるスライド制。最低25人は試合成立の最小単位"
      exception: "1軍人数が25人未満の場合はコスト上限ティアが存在せず、登録（シーズン開始）が不可"
      related:
        - "lpena.team_composition.team_total_cost"
        - "lpena.team_composition.roster"

    outside_world:
      max: 4
      balance:
        trigger_count: 4
        requirement: "投手1名以上 AND 野手1名以上"
      why: "外の世界（他シリーズ）選手の無制限参加を制限し、ゲームの世界観整合性を保つ。4名フル活用時は混成を必須とし多様な戦術を促す"
      exception: "チームタイプ（normal/hachinai）によって外の世界の定義が反転する。team_typesセクション参照"
      related:
        - "lpena.team_types"
        - "thbig_baseball.player_card.card_types"

    roster:
      max: 50
      min: 25
      why: "50人超は管理しきれない。25人は1軍登録の最低人数（first_squad_cost.minimum_playersと一致）"
      exception: "試合が1試合も行われていない場合は下限バリデーションをスキップする（シーズン前の一時保存登録を許容）"
      related:
        - "lpena.team_composition.first_squad_cost"
        - "lpena.team_composition.outside_world"

    second_team:
      max_teams_per_owner: 2
      player_exclusivity: true
      why: "1オーナーが複数チームを管理する場合も、同一選手の重複所属を禁止して公平性を保つ"
      exception: "コミッショナーによる排他チェック一時無効化を許可する（移籍処理用途）"
      related:
        - "lpena.manager.max_active_teams_per_director"

  # ─────────────────────────────────────────────────────────────
  # チーム種別と「外の世界」分類
  # ─────────────────────────────────────────────────────────────
  team_types:
    normal:
      description: "通常チーム"
      native_series:
        - "touhou"
      outside_series_condition: "series != touhou（touhou以外が外の世界枠）"
      why: "東方キャラが本来の所属（内の世界）。他シリーズキャラは世界観的に外来者"
      exception: "series=originalは常に外の世界枠（どちらのチームタイプでも同じ）"
      related:
        - "lpena.team_composition.outside_world"

    hachinai:
      description: "ハチナイチーム（チーム作成時に選択。後から変更不可）"
      native_series:
        - "hachinai"
        - "tamayomi"
      outside_series_condition: "series == touhou（touhouが外の世界枠 = 反転）"
      why: "ハチナイ・タマヨミキャラが本来の所属。東方キャラはこのチームでは外来者（設定の逆転）"
      exception: "series=originalは常に外の世界枠"
      related:
        - "lpena.team_composition.outside_world"

    original:
      description: "オリジナル選手（series=original）"
      classification: "always_outside"
      why: "特定シリーズに属さないオリジナル選手は、チームタイプに関わらず常に外の世界枠扱い"
      exception: null
      related:
        - "lpena.team_composition.outside_world"
        - "lpena.team_types.normal"
        - "lpena.team_types.hachinai"

  # ─────────────────────────────────────────────────────────────
  # シーズンルール
  # ─────────────────────────────────────────────────────────────
  season:
    one_team_one_season:
      value: true
      why: "1チームにつき1シーズンのみ存在する。シーズン管理を単純化し、二重管理を防ぐ"
      exception: null
      related: []

    cooldown_days:
      value: 10
      why: "メンバー変更後10日間は再変更不可。頻繁な入れ替えによる戦術的不公平を防ぐ"
      exception: "コミッショナーはクールダウン制限なしでメンバー変更できる"
      related:
        - "lpena.team_composition.roster"

  # ─────────────────────────────────────────────────────────────
  # 大会ルール
  # ─────────────────────────────────────────────────────────────
  competition:
    override_mechanism:
      description: "全ルール値は大会ごとに上書き可能"
      storage: "competitionモデルのrulesフィールド（jsonb）"
      priority: "competition.rules（jsonb） > game_rules.yaml デフォルト値"

    no_duplicate_entry:
      value: true
      why: "同一チームの同一大会への重複エントリーを防ぐ。1チーム1エントリーが公平性の基本"
      exception: null
      related: []

    no_duplicate_roster:
      value: true
      why: "同一大会ロスターへの同一選手カードの重複登録を防ぐ"
      exception: null
      related: []

  # ─────────────────────────────────────────────────────────────
  # 監督・コーチルール
  # ─────────────────────────────────────────────────────────────
  manager:
    one_director_per_team:
      value: true
      why: "1チームの監督は1名のみ。意思決定の責任を明確にする"
      exception: null
      related: []

    max_active_teams_per_director:
      value: 2
      why: "監督は最大2チームを同時に管理可能。セカンドチーム制度に対応する"
      exception: null
      related:
        - "lpena.team_composition.second_team"
