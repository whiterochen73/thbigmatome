# THBIG ゲームルール正本
#
# 東方BIG野球というゲームのルールを正確に参照するためのファイル。
# プロジェクト固有の情報（整合性リスク・実装メモ等）は各アプリ側で管理する。
#
# 管理: AI整合性フレームワーク（cmd_849/cmd_905/cmd_909/cmd_910）
# 参照: thbig-rules/README.md

version: "1.4"
created_at: "2026-04-01"
format_updated: "2026-04-04"
